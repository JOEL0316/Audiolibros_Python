# Netlify: build desde la raíz del monorepo
# Si en el panel tienes valores manuales, bórralos o usa estos mismos.

[build]
  command = "npm run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"

# VITE_API_URL = URL de tu API TTS (opcional, en el panel de Netlify)

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
